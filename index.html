  @keyframes fx-fall-down {

  }

    height: 1px;

    -webkit-backdrop-filter: blur(8px);

  .media-modal[hidden] {
    display: none;

  .media-frame {

    width: min(1400px, 100%);
    max-height: 96dvh;
    display: flex;
    flex-direction: column;

    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
    border-radius: 1.5rem;
    background: #111;
    overflow: hidden;
    box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.35);

  .media-frame-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04));

  .media-frame-title {
    margin: 0;
    font-family: Quicksand, sans-serif;

  .media-close {

    height: 44px;

    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);

  .media-close:active {
    transform: scale(0.95);
  }

  .media-stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 280px;
    max-height: calc(96dvh - 110px);
    background:
      radial-gradient(circle at 20% 20%, rgba(255, 217, 61, 0.12), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(147, 245, 156, 0.12), transparent 40%),

  .media-player-overlay {
    position: absolute;

    align-items: center;
    justify-content: center;

  .media-player-controls {
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;

<script>
    const queryInput = document.querySelector("#query");
    const goButton = document.querySelector("#goButton");
    const micButton = document.querySelector("#micButton");
    const musicToggle = document.querySelector("#musicToggle");
    const effectsToggle = document.querySelector("#effectsToggle");
    const effectsIcon = document.querySelector("#effectsIcon");
    const fxMenu = document.querySelector("#fxMenu");
    const fxLayer = document.querySelector("#fxLayer");
    const mediaPickButton = document.querySelector("#mediaPickButton");
    const mediaPicker = document.querySelector("#mediaPicker");
    const mediaModal = document.querySelector("#mediaModal");
    const mediaStage = document.querySelector("#mediaStage");
    const mediaImage = document.querySelector("#mediaImage");
    const mediaPlayer = document.querySelector("#mediaPlayer");
    const mediaVideo = document.querySelector("#mediaVideo");
    const mediaPlayBig = document.querySelector("#mediaPlayBig");
    const mediaPlayBtn = document.querySelector("#mediaPlayBtn");
    const mediaMuteBtn = document.querySelector("#mediaMuteBtn");
    const mediaProgress = document.querySelector("#mediaProgress");
    const mediaProgressFill = document.querySelector("#mediaProgressFill");
    const mediaTime = document.querySelector("#mediaTime");
    const mediaCloseButton = document.querySelector("#mediaCloseButton");
    const mediaModalTitle = document.querySelector("#mediaModalTitle");
    const timeText = document.querySelector("#time");
    const dateText = document.querySelector("#date");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    const MUSIC_PREF_KEY = "bebu-bg-music";
    const EFFECTS_PREF_KEY = "bebu-fx-effect";
    const FX_PRESETS = {
      off: { icon: "✨", items: [] },
      animals: {
        icon: "🦋",
        items: ["🐸", "🦆", "🦋", "🐰", "🐥", "🐭", "🐱", "🐶", "🐝", "🐠", "🐦", "🐢", "🐷", "🐼"]
      },
      bubbles: {
        icon: "🫧",
        items: ["🫧", "💧", "🔵", "🫧", "💠", "🫧", "💧", "🫧", "🔵", "🫧", "💧", "🫧"]
      },
      stars: {
        icon: "⭐",
        items: ["⭐", "✨", "🌟", "💫", "⭐", "✨", "🌟", "⭐", "💫", "✨", "🌟", "⭐"]
      },
      hearts: {
        icon: "💖",
        items: ["💖", "💗", "💓", "💕", "💘", "❤️", "🧡", "💛", "💚", "💙", "💜", "💖"]
      },
      candy: {
        icon: "🍬",
        items: ["🍬", "🍭", "🍫", "🍩", "🍪", "🧁", "🍰", "🍦", "🍬", "🍭", "🍫", "🧁"]
      },
      snow: {
        icon: "❄️",
        items: ["❄️", "🌨️", "⛄", "❄️", "🤍", "❄️", "🌨️", "❄️", "⛄", "❄️", "🤍", "❄️"]
      }
    };

    const musicState = {
      ctx: null,
      master: null,
      timer: null,
      step: 0,
      enabled: localStorage.getItem(MUSIC_PREF_KEY) !== "off",
      playing: false,
      pausedForMic: false
    };

    const savedFx = localStorage.getItem(EFFECTS_PREF_KEY);
    let currentFx = FX_PRESETS[savedFx] ? savedFx : "off";
    let fxMenuOpen = false;

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function renderFxLayer(fxId) {
      const preset = FX_PRESETS[fxId] || FX_PRESETS.off;
      fxLayer.dataset.fx = fxId;
      fxLayer.classList.toggle("is-off", fxId === "off");
      fxLayer.innerHTML = "";

      if (fxId === "off") return;

      preset.items.forEach((emoji, index) => {
        const item = document.createElement("span");
        item.className = "fx-item";
        item.textContent = emoji;
        item.style.setProperty("--x", `${rand(2, 94).toFixed(1)}%`);
        item.style.setProperty("--size", `${rand(1.5, 2.5).toFixed(2)}rem`);
        item.style.setProperty("--duration", `${rand(9, 16).toFixed(1)}s`);
        item.style.setProperty("--delay", `${(index * 0.7 + rand(0, 1.2)).toFixed(1)}s`);
        item.style.setProperty("--sway", `${rand(-42, 42).toFixed(0)}px`);
        item.style.setProperty("--rotate-start", `${rand(-14, 14).toFixed(0)}deg`);
        item.style.setProperty("--rotate-mid", `${rand(-14, 14).toFixed(0)}deg`);
        item.style.setProperty("--rotate-end", `${rand(-14, 14).toFixed(0)}deg`);
        fxLayer.appendChild(item);
      });
    }

    function updateFxMenu() {
      fxMenu.querySelectorAll(".fx-option").forEach((button) => {
        const active = button.dataset.fx === currentFx;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-checked", active ? "true" : "false");
      });
    }

    function updateEffectsButton() {
      const active = currentFx !== "off";
      effectsIcon.textContent = FX_PRESETS[currentFx].icon;
      effectsToggle.classList.toggle("is-off", !active);
      effectsToggle.classList.toggle("is-playing", active);
      effectsToggle.setAttribute("aria-expanded", fxMenuOpen ? "true" : "false");
      effectsToggle.setAttribute(
        "aria-label",
        fxMenuOpen ? "Đóng menu hiệu ứng" : "Chọn hiệu ứng"
      );
    }

    function setFxMenuOpen(open) {
      fxMenuOpen = open;
      fxMenu.hidden = !open;
      updateEffectsButton();
    }

    function setEffect(fxId) {
      if (!FX_PRESETS[fxId]) fxId = "off";
      currentFx = fxId;
      localStorage.setItem(EFFECTS_PREF_KEY, fxId);
      renderFxLayer(fxId);
      updateFxMenu();
      updateEffectsButton();
      setFxMenuOpen(false);
    }

    effectsToggle.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      navigator.vibrate?.(30);
      setFxMenuOpen(!fxMenuOpen);
    });

    fxMenu.addEventListener("click", (event) => {
      const option = event.target.closest(".fx-option");
      if (!option) return;
      event.preventDefault();
      event.stopPropagation();
      navigator.vibrate?.(30);
      setEffect(option.dataset.fx);
    });

    document.addEventListener("pointerdown", (event) => {
      if (!fxMenuOpen) return;
      if (event.target.closest("#fxMenu, #effectsToggle")) return;
      setFxMenuOpen(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && fxMenuOpen) setFxMenuOpen(false);
    });

    renderFxLayer(currentFx);
    updateFxMenu();
    updateEffectsButton();

    // Giai điệu vui nhộn kiểu thiếu nhi (C major), nhịp nhanh nhẹ
    const MELODY = [
      523.25, 587.33, 659.25, 698.46, 783.99, 698.46, 659.25, 587.33,
      523.25, 659.25, 783.99, 880.00, 783.99, 659.25, 587.33, 523.25,
      392.00, 440.00, 493.88, 523.25, 587.33, 523.25, 493.88, 440.00,
      523.25, 587.33, 659.25, 783.99, 880.00, 783.99, 659.25, 523.25
    ];
    const BASS = [
      130.81, 130.81, 164.81, 164.81, 174.61, 174.61, 196.00, 196.00,
      130.81, 130.81, 196.00, 196.00, 174.61, 174.61, 164.81, 130.81,
      98.00, 98.00, 110.00, 110.00, 130.81, 130.81, 146.83, 146.83,
      130.81, 130.81, 164.81, 196.00, 220.00, 196.00, 164.81, 130.81
    ];
    const STEP_MS = 180;

    function ensureMusicContext() {
      if (musicState.ctx) return musicState.ctx;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return null;
      const ctx = new AudioCtx();
      const master = ctx.createGain();
      master.gain.value = 0.12;
      master.connect(ctx.destination);
      musicState.ctx = ctx;
      musicState.master = master;
      return ctx;
    }

    function playTone(freq, duration, type, volume) {
      const ctx = musicState.ctx;
      const master = musicState.master;
      if (!ctx || !master || !freq) return;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const now = ctx.currentTime;

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.connect(gain);
      gain.connect(master);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playMusicStep() {
      if (!musicState.playing || musicState.pausedForMic) return;
      const i = musicState.step % MELODY.length;
      const melody = MELODY[i];
      const bass = BASS[i];
      const isAccent = i % 4 === 0;

      playTone(melody, isAccent ? 0.22 : 0.16, "triangle", isAccent ? 0.28 : 0.2);
      playTone(bass, 0.28, "sine", 0.12);
      if (i % 2 === 0) {
        playTone(melody * 2, 0.08, "sine", 0.05);
      }

      musicState.step += 1;
    }

    function updateMusicButton() {
      const on = musicState.enabled && musicState.playing && !musicState.pausedForMic;
      musicToggle.classList.toggle("is-playing", on);
      musicToggle.classList.toggle("is-muted", !musicState.enabled);
      musicToggle.setAttribute("aria-pressed", musicState.enabled ? "true" : "false");
      musicToggle.setAttribute(
        "aria-label",
        musicState.enabled ? "Tắt nhạc nền" : "Bật nhạc nền"
      );
    }

    async function startMusic() {
      if (!musicState.enabled) return;
      const ctx = ensureMusicContext();
      if (!ctx) return;

      if (ctx.state === "suspended") {
        try {
          await ctx.resume();
        } catch (e) {
          return;
        }
      }

      if (musicState.timer) return;
      musicState.playing = true;
      musicState.pausedForMic = false;
      playMusicStep();
      musicState.timer = window.setInterval(playMusicStep, STEP_MS);
      updateMusicButton();
    }

    function stopMusicLoop() {
      if (musicState.timer) {
        window.clearInterval(musicState.timer);
        musicState.timer = null;
      }
      musicState.playing = false;
      updateMusicButton();
    }

    function pauseMusicForMic() {
      musicState.pausedForMic = true;
      if (musicState.timer) {
        window.clearInterval(musicState.timer);
        musicState.timer = null;
      }
      updateMusicButton();
    }

    function resumeMusicAfterMic() {
      musicState.pausedForMic = false;
      if (musicState.enabled && musicState.playing && !musicState.timer) {
        musicState.timer = window.setInterval(playMusicStep, STEP_MS);
      }
      updateMusicButton();
    }

    function setMusicEnabled(enabled) {
      musicState.enabled = enabled;
      localStorage.setItem(MUSIC_PREF_KEY, enabled ? "on" : "off");
      if (enabled) {
        startMusic();
      } else {
        stopMusicLoop();
      }
      updateMusicButton();
    }

    musicToggle.addEventListener("click", () => {
      navigator.vibrate?.(30);
      if (musicState.enabled && !musicState.playing) {
        startMusic();
        return;
      }
      setMusicEnabled(!musicState.enabled);
    });

    // Trình duyệt chặn autoplay: bật nhạc ở lần chạm/click đầu tiên
    function unlockMusicOnce() {
      if (!musicState.enabled) return;
      startMusic();
    }
    ["pointerdown", "keydown", "touchstart"].forEach((eventName) => {
      document.addEventListener(eventName, unlockMusicOnce, { once: true, passive: true });
    });
    updateMusicButton();
    startMusic();

    let mediaObjectUrl = null;
    let musicPausedForMedia = false;
    let mediaControlsTimer = null;
    let mediaSeeking = false;

    function pauseMusicForMedia() {
      if (!musicState.enabled || !musicState.playing || musicState.pausedForMic) return;
      musicPausedForMedia = true;
      pauseMusicForMic();
    }

    function resumeMusicAfterMedia() {
      if (!musicPausedForMedia) return;
      musicPausedForMedia = false;
      resumeMusicAfterMic();
    }

    function formatMediaTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const total = Math.floor(seconds);
      const m = Math.floor(total / 60);
      const s = String(total % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function updateMediaProgress() {
      const duration = mediaVideo.duration || 0;
      const current = mediaVideo.currentTime || 0;
      const percent = duration ? (current / duration) * 100 : 0;
      mediaProgressFill.style.width = `${percent}%`;
      mediaProgress.setAttribute("aria-valuenow", String(Math.round(percent)));
      mediaTime.textContent = `${formatMediaTime(current)} / ${formatMediaTime(duration)}`;
    }

    function setMediaPlayingUi(playing) {
      mediaPlayer.classList.toggle("is-playing", playing);
      mediaPlayer.classList.toggle("is-paused", !playing);
      mediaPlayBig.setAttribute("aria-label", playing ? "Tạm dừng" : "Phát");
      mediaPlayBtn.setAttribute("aria-label", playing ? "Tạm dừng" : "Phát");
    }

    function showMediaControls(autoHide) {
      mediaPlayer.classList.add("controls-visible");
      window.clearTimeout(mediaControlsTimer);
      if (autoHide && !mediaVideo.paused) {
        mediaControlsTimer = window.setTimeout(() => {
          mediaPlayer.classList.remove("controls-visible");
        }, 2500);
      }
    }

    function toggleMediaPlayback() {
      if (mediaVideo.paused) {
        mediaVideo.play().catch(() => {});
      } else {
        mediaVideo.pause();
      }
      showMediaControls(true);
    }

    function seekMediaFromEvent(event) {
      const rect = mediaProgress.getBoundingClientRect();
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      if (Number.isFinite(mediaVideo.duration)) {
        mediaVideo.currentTime = ratio * mediaVideo.duration;
        updateMediaProgress();
      }
    }

    function resetMediaPlayerUi() {
      window.clearTimeout(mediaControlsTimer);
      mediaPlayer.classList.remove("controls-visible", "is-playing", "is-muted");
      mediaPlayer.classList.add("is-paused");
      mediaProgressFill.style.width = "0%";
      mediaTime.textContent = "0:00 / 0:00";
      mediaVideo.muted = false;
      mediaMuteBtn.setAttribute("aria-label", "Tắt tiếng");
    }

    function clearMediaPreview() {
      if (mediaObjectUrl) {
        URL.revokeObjectURL(mediaObjectUrl);
        mediaObjectUrl = null;
      }
      mediaVideo.pause();
      mediaVideo.removeAttribute("src");
      mediaVideo.load();
      mediaImage.removeAttribute("src");
      mediaImage.hidden = true;
      mediaPlayer.hidden = true;
      resetMediaPlayerUi();
    }

    function closeMediaModal() {
      mediaModal.hidden = true;
      document.body.style.overflow = "";
      clearMediaPreview();
      resumeMusicAfterMedia();
    }

    function openMediaModal(file) {
      clearMediaPreview();
      mediaObjectUrl = URL.createObjectURL(file);
      const isVideo = file.type.startsWith("video/");
      const isImage = file.type.startsWith("image/");

      if (!isVideo && !isImage) {
        clearMediaPreview();
        return;
      }

      mediaStage.dataset.type = isVideo ? "video" : "image";
      mediaModalTitle.textContent = isVideo ? "Video của bé" : "Ảnh của bé";

      if (isVideo) {
        mediaImage.hidden = true;
        mediaPlayer.hidden = false;
        mediaVideo.loop = true;
        mediaVideo.src = mediaObjectUrl;
        pauseMusicForMedia();
        const playVideo = () => {
          mediaVideo.play().then(() => {
            setMediaPlayingUi(true);
          }).catch(() => {
            setMediaPlayingUi(false);
          });
        };
        if (mediaVideo.readyState >= 2) {
          playVideo();
        } else {
          mediaVideo.addEventListener("loadeddata", playVideo, { once: true });
        }
      } else {
        mediaPlayer.hidden = true;
        mediaVideo.pause();
        mediaImage.hidden = false;
        mediaImage.src = mediaObjectUrl;
      }

      mediaModal.hidden = false;
      document.body.style.overflow = "hidden";
      mediaCloseButton.focus();
    }

    mediaPickButton.addEventListener("click", () => {
      navigator.vibrate?.(30);
      mediaPicker.click();
    });

    mediaPicker.addEventListener("change", () => {
      const file = mediaPicker.files && mediaPicker.files[0];
      mediaPicker.value = "";
      if (!file) return;
      openMediaModal(file);
    });

    mediaCloseButton.addEventListener("click", () => {
      navigator.vibrate?.(20);
      closeMediaModal();
    });

    mediaModal.addEventListener("click", (event) => {
      if (event.target === mediaModal) closeMediaModal();
    });

    mediaPlayBig.addEventListener("click", (event) => {
      event.stopPropagation();
      toggleMediaPlayback();
    });

    mediaPlayBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      toggleMediaPlayback();
    });

    mediaMuteBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      mediaVideo.muted = !mediaVideo.muted;
      mediaPlayer.classList.toggle("is-muted", mediaVideo.muted);
      mediaMuteBtn.setAttribute("aria-label", mediaVideo.muted ? "Bật tiếng" : "Tắt tiếng");
      showMediaControls(true);
    });

    mediaVideo.addEventListener("click", () => {
      toggleMediaPlayback();
    });

    mediaVideo.addEventListener("play", () => {
      setMediaPlayingUi(true);
      showMediaControls(true);
    });

    mediaVideo.addEventListener("pause", () => {
      setMediaPlayingUi(false);
      showMediaControls(false);
    });

    mediaVideo.addEventListener("ended", () => {
      setMediaPlayingUi(false);
      showMediaControls(false);
    });

    mediaVideo.addEventListener("timeupdate", () => {
      if (!mediaSeeking) updateMediaProgress();
    });

    mediaVideo.addEventListener("loadedmetadata", updateMediaProgress);

    mediaPlayer.addEventListener("pointermove", () => {
      if (mediaStage.dataset.type === "video") showMediaControls(true);
    });

    mediaProgress.addEventListener("pointerdown", (event) => {
      mediaSeeking = true;
      mediaProgress.setPointerCapture(event.pointerId);
      seekMediaFromEvent(event);
      showMediaControls(false);
    });

    mediaProgress.addEventListener("pointermove", (event) => {
      if (!mediaSeeking) return;
      seekMediaFromEvent(event);
    });

    mediaProgress.addEventListener("pointerup", (event) => {
      if (!mediaSeeking) return;
      mediaSeeking = false;
      seekMediaFromEvent(event);
      showMediaControls(true);
    });

    mediaProgress.addEventListener("pointercancel", () => {
      mediaSeeking = false;
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !mediaModal.hidden) closeMediaModal();
    });

    function normalizeVietnamese(text) {
      return text
        .trim()
        .replace(/\s+/g, " ")
        .replace(/^ếch\s+ộp$/i, "ech op thieu nhi")
        .replace(/^ech\s+op$/i, "ech op thieu nhi")
        .replace(/^con\s+cào\s+cào$/i, "con cao cao thieu nhi")
        .replace(/^con\s+cao\s+cao$/i, "con cao cao thieu nhi")
        .replace(/^chun\s+chun$/i, "chun chun nhac thieu nhi")
        .replace(/^con\s+vịt$/i, "con vit nhac thieu nhi")
        .replace(/^con\s+vit$/i, "con vit nhac thieu nhi")
        .replace(/^em\s+tập\s+lái\s+ô\s+tô$/i, "em tap lai o to thieu nhi")
        .replace(/^em\s+tap\s+lai\s+o\s+to$/i, "em tap lai o to thieu nhi")
        .replace(/^con\s+chuột\s+nhắt$/i, "con chuot nhat thieu nhi")
        .replace(/^con\s+chuot\s+nhat$/i, "con chuot nhat thieu nhi");
    }

    function setListening(isListening) {
      if (isListening) {
        micButton.classList.add("listening");
      } else {
        micButton.classList.remove("listening");
      }
    }

    function getYoutubeUrls(query) {
      const encoded = encodeURIComponent(query);
      const webUrl = "https://www.youtube.com/results?search_query=" + encoded;
      const ua = navigator.userAgent || "";
      const isIOS = /iPad|iPhone|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);

      if (isIOS) {
        return {
          appUrl: "youtube://www.youtube.com/results?search_query=" + encoded,
          webUrl
        };
      }

      if (isAndroid) {
        return {
          appUrl: "vnd.youtube://results?search_query=" + encoded,
          webUrl
        };
      }

      return { appUrl: webUrl, webUrl };
    }

    function openYoutube(rawQuery) {
      const query = normalizeVietnamese(rawQuery || queryInput.value);
      if (!query) {
        queryInput.focus();
        return;
      }

      queryInput.value = query;

      const { appUrl, webUrl } = getYoutubeUrls(query);
      if (appUrl === webUrl) {
        window.location.href = webUrl;
        return;
      }

      const openedAt = Date.now();
      window.location.href = appUrl;
      window.setTimeout(() => {
        if (document.visibilityState !== "hidden" && Date.now() - openedAt < 2500) {
          window.location.href = webUrl;
        }
      }, 1000);
    }

    function setupSpeech() {
      if (!SpeechRecognition) {
        micButton.disabled = true;
        micButton.style.filter = "grayscale(1)";
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "vi-VN";
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        listening = true;
        setListening(true);
        pauseMusicForMic();
      };

      recognition.onresult = (event) => {
        const transcript = Array.from(event.results)
          .map((result) => result[0].transcript)
          .join(" ");
        queryInput.value = normalizeVietnamese(transcript);

        if (event.results[event.results.length - 1].isFinal) {
          window.setTimeout(() => openYoutube(queryInput.value), 250);
        }
      };

      recognition.onerror = () => {
        setListening(false);
        resumeMusicAfterMic();
      };

      recognition.onend = () => {
        listening = false;
        setListening(false);
        resumeMusicAfterMic();
      };
    }

    function updateClock() {
      const now = new Date();
      timeText.textContent = new Intl.DateTimeFormat("vi-VN", {
        hour: "2-digit",
        minute: "2-digit"
      }).format(now);
      dateText.textContent = new Intl.DateTimeFormat("vi-VN", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit"
      }).format(now);
    }

    document.querySelectorAll(".tile").forEach((button) => {
      button.addEventListener("click", () => {
        navigator.vibrate?.(40);
        openYoutube(button.dataset.query);
      });
    });

    goButton.addEventListener("click", () => {
      navigator.vibrate?.(40);
      openYoutube(queryInput.value);
    });

    micButton.addEventListener("click", () => {
      if (!recognition || listening) return;
      try {
        recognition.start();
      } catch (e) {
        console.error(e);
      }
    });

    queryInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        openYoutube();
      }
    });

    setupSpeech();
    updateClock();
    setInterval(updateClock, 1000);

    const fullscreenGate = document.querySelector("#fullscreenGate");

    function isFullscreenActive() {
      return Boolean(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.webkitCurrentFullScreenElement
      );
    }

    function isStandaloneDisplay() {
      return (
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true
      );
    }

    async function enterFullscreen() {
      if (isFullscreenActive() || isStandaloneDisplay()) return true;
      const root = document.documentElement;
      try {
        if (root.requestFullscreen) {
          await root.requestFullscreen({ navigationUI: "hide" });
          return true;
        }
        if (root.webkitRequestFullscreen) {
          root.webkitRequestFullscreen();
          return true;
        }
        if (root.webkitRequestFullScreen) {
          root.webkitRequestFullScreen();
          return true;
        }
      } catch (e) {
        // Trình duyệt chặn fullscreen nếu không có thao tác người dùng
      }
      return isFullscreenActive();
    }

    function dismissFullscreenGate() {
      if (!fullscreenGate || fullscreenGate.hidden) return;
      fullscreenGate.hidden = true;
    }

    async function startImmersiveMode() {
      navigator.vibrate?.(30);
      await enterFullscreen();
      dismissFullscreenGate();
      if (musicState.enabled) startMusic();
    }

    if (fullscreenGate) {
      if (isStandaloneDisplay() || isFullscreenActive()) {
        dismissFullscreenGate();
      } else {
        fullscreenGate.addEventListener("click", (event) => {
          event.preventDefault();
          startImmersiveMode();
        });
      }
    }

    // Giữ fullscreen nếu người dùng thoát rồi chạm lại trang
    document.addEventListener("pointerdown", () => {
      if (fullscreenGate && !fullscreenGate.hidden) return;
      if (!isFullscreenActive() && !isStandaloneDisplay()) {
        enterFullscreen();
      }
    }, { passive: true });

    document.addEventListener("fullscreenchange", () => {
      if (isFullscreenActive()) dismissFullscreenGate();
    });
    document.addEventListener("webkitfullscreenchange", () => {
      if (isFullscreenActive()) dismissFullscreenGate();
    });

    // Thử vào fullscreen ngay khi tải (thường bị chặn, sẽ dùng màn hình chạm)
    enterFullscreen().then((ok) => {
      if (ok) dismissFullscreenGate();
    });
</script>
</body></html>
