<script>
    const queryInput = document.querySelector("#query");
    const goButton = document.querySelector("#goButton");
    const micButton = document.querySelector("#micButton");
    const timeText = document.querySelector("#time");
    const dateText = document.querySelector("#date");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    function normalizeVietnamese(text) {
      return text
        .trim()
        .replace(/\s+/g, " ")
        .replace(/^ếch\s+ộp$/i, "ech op thieu nhi")
        .replace(/^ech\s+op$/i, "ech op thieu nhi")
        .replace(/^con\s+cào\s+cào$/i, "con cao cao thieu nhi")
        .replace(/^con\s+cao\s+cao$/i, "con cao cao thieu nhi")
        .replace(/^chun\s+chun$/i, "chun chun nhac thieu nhi")
        .replace(/^con\s+vịt$/i, "con vit nhac thieu nhi")
        .replace(/^con\s+vit$/i, "con vit nhac thieu nhi")
        .replace(/^em\s+tập\s+lái\s+ô\s+tô$/i, "em tap lai o to thieu nhi")
        .replace(/^em\s+tap\s+lai\s+o\s+to$/i, "em tap lai o to thieu nhi")
        .replace(/^con\s+chuột\s+nhắt$/i, "con chuot nhat thieu nhi")
        .replace(/^con\s+chuot\s+nhat$/i, "con chuot nhat thieu nhi");
    }

    function setListening(isListening) {
      if (isListening) {
        micButton.classList.add("listening");
      } else {
        micButton.classList.remove("listening");
      }
    }

    function getYoutubeUrls(query) {
      const encoded = encodeURIComponent(query);
      const webUrl = "https://www.youtube.com/results?search_query=" + encoded;
      const ua = navigator.userAgent || "";
      const isIOS = /iPad|iPhone|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);

      if (isIOS) {
        return {
          appUrl: "youtube://www.youtube.com/results?search_query=" + encoded,
          webUrl
        };
      }

      if (isAndroid) {
        return {
          appUrl: "vnd.youtube://results?search_query=" + encoded,
          webUrl
        };
      }

      return { appUrl: webUrl, webUrl };
    }

    function openYoutube(rawQuery) {
      const query = normalizeVietnamese(rawQuery || queryInput.value);
      if (!query) {
        queryInput.focus();
        return;
      }

      queryInput.value = query;

      const { appUrl, webUrl } = getYoutubeUrls(query);
      if (appUrl === webUrl) {
        window.location.href = webUrl;
        return;
      }

      const openedAt = Date.now();
      window.location.href = appUrl;
      window.setTimeout(() => {
        if (document.visibilityState !== "hidden" && Date.now() - openedAt < 2500) {
          window.location.href = webUrl;
        }
      }, 1000);
    }

    function setupSpeech() {
      if (!SpeechRecognition) {
        micButton.disabled = true;
        micButton.style.filter = "grayscale(1)";
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "vi-VN";
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        listening = true;
        setListening(true);
      };

      recognition.onresult = (event) => {
        const transcript = Array.from(event.results)
          .map((result) => result[0].transcript)
          .join(" ");
        queryInput.value = normalizeVietnamese(transcript);

        if (event.results[event.results.length - 1].isFinal) {
          window.setTimeout(() => openYoutube(queryInput.value), 250);
        }
      };

      recognition.onerror = () => {
        setListening(false);
      };

      recognition.onend = () => {
        listening = false;
        setListening(false);
      };
    }

    function updateClock() {
      const now = new Date();
      timeText.textContent = new Intl.DateTimeFormat("vi-VN", {
        hour: "2-digit",
        minute: "2-digit"
      }).format(now);
      dateText.textContent = new Intl.DateTimeFormat("vi-VN", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit"
      }).format(now);
    }

    document.querySelectorAll(".tile").forEach((button) => {
      button.addEventListener("click", () => {
        navigator.vibrate?.(40);
        openYoutube(button.dataset.query);
      });
    });

    goButton.addEventListener("click", () => {
      navigator.vibrate?.(40);
      openYoutube(queryInput.value);
    });

    micButton.addEventListener("click", () => {
      if (!recognition || listening) return;
      try {
        recognition.start();
      } catch (e) {
        console.error(e);
      }
    });

    queryInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        openYoutube();
      }
    });

    setupSpeech();
    updateClock();
    setInterval(updateClock, 1000);
</script>
